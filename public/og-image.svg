<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FDF8F3"/>
      <stop offset="100%" stop-color="#F0E2CC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left terracotta accent strip -->
  <rect x="0" y="0" width="10" height="630" fill="#9C5030"/>

  <!-- Bottom chocolate strip -->
  <rect x="0" y="562" width="1200" height="68" fill="#3D2314"/>

  <!-- ── HD monogram — centred at x=600, y=155–355 ── -->
  <!-- H: left bar, right bar, crossbar — dark chocolate -->
  <rect x="446" y="155" width="52"  height="200" fill="#3D2314"/>
  <rect x="550" y="155" width="52"  height="200" fill="#3D2314"/>
  <rect x="446" y="232" width="156" height="46"  fill="#3D2314"/>

  <!-- D: left bar + rounded bowl touching H at x=602 — muted terracotta (matches logo) -->
  <!-- Path: top-left → bottom-left → bottom stem → arc counter-clockwise (bowl right) → close -->
  <path d="M 602 155 L 602 355 L 654 355 A 100 100 0 0 0 654 155 Z" fill="#9C5030"/>

  <!-- White curved notch at lower-right of D bowl (matches logo detail) -->
  <path d="M 730 308 Q 758 344 678 353" stroke="#FDF8F3" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Brand name -->
  <text x="600" y="452"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="68"
        font-weight="700"
        text-anchor="middle"
        fill="#3D2314">Hosting Decoded</text>

  <!-- Beige rule -->
  <rect x="440" y="470" width="320" height="2" fill="#D4A574" opacity="0.7"/>

  <!-- Tagline -->
  <text x="600" y="520"
        font-family="Georgia, serif"
        font-size="26"
        text-anchor="middle"
        fill="#3D2314"
        opacity="0.55">Your insider guide to short-term rental success</text>

  <!-- URL in bottom strip -->
  <text x="600" y="607"
        font-family="Arial, Helvetica, sans-serif"
        font-size="22"
        font-weight="600"
        text-anchor="middle"
        fill="#FDF8F3"
        opacity="0.55"
        letter-spacing="1">hostingdecoded.com</text>
</svg>
